<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Secreto de las Gemas · Los Gallardos 2050</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#F4B942;--gold-light:#FFD97D;
  --gem-blue:#38C6F4;--gem-purple:#B06FE8;--gem-green:#3DDBA0;
  --gem-red:#F4606C;--gem-amber:#F49C42;
  --stone:#1A1A2E;--stone-mid:#16213E;--stone-light:#0F3460;
  --parchment:#F5E6C8;
  --font-display:'Cinzel Decorative',serif;
  --font-title:'Cinzel',serif;
  --font-body:'Nunito',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-body);background:var(--stone);color:#E8D5B0;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(56,198,244,0.07) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(176,111,232,0.07) 0%,transparent 50%);pointer-events:none;z-index:0;}

/* HERO */
.hero{position:relative;z-index:1;text-align:center;padding:2.5rem 1.5rem 1.5rem;}
.hero-border{max-width:700px;margin:0 auto;border:1.5px solid rgba(244,185,66,0.25);border-radius:18px;padding:2rem 1.5rem 1.5rem;background:linear-gradient(135deg,rgba(22,33,62,0.92),rgba(15,52,96,0.7),rgba(22,33,62,0.92));box-shadow:0 0 40px rgba(56,198,244,0.1),0 0 70px rgba(244,185,66,0.06),inset 0 1px 0 rgba(244,185,66,0.15);position:relative;}
.hero-border::before{content:'✦';position:absolute;top:-11px;left:50%;transform:translateX(-50%);color:var(--gold);font-size:1.1rem;background:var(--stone);padding:0 8px;}
.logo-wrap{width:80px;height:80px;margin:0 auto 1rem;animation:glow 3s ease-in-out infinite;}
.logo-wrap img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 18px rgba(56,198,244,0.55)) drop-shadow(0 0 35px rgba(244,185,66,0.35));}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 12px rgba(56,198,244,0.4));}50%{filter:drop-shadow(0 0 28px rgba(56,198,244,0.8)) drop-shadow(0 0 45px rgba(244,185,66,0.45));}}
.hero-eyebrow{font-family:var(--font-title);font-size:0.65rem;letter-spacing:4px;text-transform:uppercase;color:var(--gem-blue);margin-bottom:7px;opacity:0.85;}
.hero-title{font-family:var(--font-display);font-size:clamp(1.3rem,4vw,2rem);font-weight:900;background:linear-gradient(135deg,var(--gold-light),var(--gold),var(--gem-blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:5px;filter:drop-shadow(0 2px 8px rgba(244,185,66,0.25));}
.hero-sub{font-family:var(--font-title);font-size:0.72rem;color:rgba(232,213,176,0.55);letter-spacing:2px;margin-bottom:1.2rem;}

/* GROUP SELECTOR */
.selector-title{font-family:var(--font-title);font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;color:rgba(244,185,66,0.6);margin-bottom:10px;}
.groups-selector{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.sel-btn{font-family:var(--font-title);font-size:0.68rem;letter-spacing:1px;padding:6px 14px;border-radius:20px;border:1px solid rgba(244,185,66,0.2);background:rgba(244,185,66,0.04);color:rgba(232,213,176,0.6);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:5px;}
.sel-btn:hover{border-color:rgba(244,185,66,0.4);color:var(--gold);background:rgba(244,185,66,0.08);}
.sel-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(244,185,66,0.12);box-shadow:0 0 12px rgba(244,185,66,0.15);}

/* NAV */
.nav-wrap{max-width:860px;margin:0 auto;padding:.75rem 1.5rem 0;position:relative;z-index:1;}
.nav{display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid rgba(244,185,66,0.1);}
.nav-btn{font-family:var(--font-title);font-size:0.65rem;letter-spacing:1.5px;text-transform:uppercase;padding:7px 14px;border-radius:7px 7px 0 0;border:1px solid transparent;border-bottom:none;background:transparent;color:rgba(232,213,176,0.35);cursor:pointer;transition:all 0.2s;position:relative;bottom:-1px;}
.nav-btn:hover{color:var(--gold);}
.nav-btn.active{color:var(--gold);background:rgba(22,33,62,0.95);border-color:rgba(244,185,66,0.13);border-bottom-color:rgba(22,33,62,0.95);}

/* MAIN */
.main{max-width:860px;margin:0 auto;padding:1.25rem 1.5rem 5rem;position:relative;z-index:1;}
.view{display:none;}.view.active{display:block;animation:fadeUp 0.35s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.section-lbl{font-family:var(--font-title);font-size:0.6rem;letter-spacing:3px;text-transform:uppercase;color:rgba(244,185,66,0.4);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-lbl::after{content:'';flex:1;height:1px;background:rgba(244,185,66,0.07);}

/* CARDS */
.gem-card{background:linear-gradient(135deg,rgba(22,33,62,0.95),rgba(15,52,96,0.6));border:1px solid rgba(244,185,66,0.1);border-radius:14px;transition:all 0.2s;position:relative;overflow:hidden;}
.gem-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--card-accent,linear-gradient(90deg,var(--gold),var(--gem-blue)));opacity:0.55;}

/* MY GROUP PANEL */
.my-group-panel{padding:0;}
.mg-header{padding:1.25rem 1.5rem;border-bottom:1px solid rgba(244,185,66,0.08);display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.mg-emoji{font-size:2.5rem;}
.mg-title{font-family:var(--font-title);font-size:1.1rem;font-weight:700;color:var(--gold-light);}
.mg-meta{font-size:0.75rem;color:rgba(232,213,176,0.5);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}

/* LEVEL GEMS */
.level-gem{display:inline-flex;align-items:center;gap:4px;font-size:0.6rem;font-family:var(--font-title);letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:10px;}
.lv-aprendiz{background:rgba(156,163,175,0.1);color:#9CA3AF;border:1px solid rgba(156,163,175,0.18);}
.lv-explorador{background:rgba(56,198,244,0.1);color:var(--gem-blue);border:1px solid rgba(56,198,244,0.22);}
.lv-guardian{background:rgba(61,219,160,0.1);color:var(--gem-green);border:1px solid rgba(61,219,160,0.22);}
.lv-maestro{background:rgba(244,185,66,0.1);color:var(--gold);border:1px solid rgba(244,185,66,0.28);}

/* PROGRESS */
.progress-section{padding:1.25rem 1.5rem;border-bottom:1px solid rgba(244,185,66,0.06);}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.progress-label{font-family:var(--font-title);font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;color:rgba(232,213,176,0.45);}
.progress-pct{font-family:var(--font-display);font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.bar-track{background:rgba(255,255,255,0.04);border-radius:99px;height:8px;overflow:hidden;}
.bar-fill{height:8px;border-radius:99px;transition:width 0.8s cubic-bezier(.34,1.56,.64,1);}
.pts-big{font-family:var(--font-display);font-size:2.2rem;font-weight:700;background:linear-gradient(135deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-top:10px;}
.pts-sub{font-family:var(--font-title);font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;color:rgba(232,213,176,0.35);text-align:center;margin-bottom:6px;}

/* ROLES */
.roles-section{padding:1rem 1.5rem;border-bottom:1px solid rgba(244,185,66,0.06);display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
.role-card{background:rgba(176,111,232,0.06);border:1px solid rgba(176,111,232,0.14);border-radius:9px;padding:8px 10px;text-align:center;}
.role-icon{font-size:1.2rem;margin-bottom:3px;}
.role-title{font-family:var(--font-title);font-size:0.58rem;letter-spacing:1px;text-transform:uppercase;color:var(--gem-purple);margin-bottom:3px;}
.role-name{font-size:0.8rem;font-weight:700;color:var(--parchment);}
.role-empty{color:rgba(232,213,176,0.25);font-style:italic;font-size:0.75rem;}

/* TASKS LIST */
.tasks-section{padding:1rem 1.5rem;}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid rgba(244,185,66,0.05);}
.task-item:last-child{border:none;}
.task-icon{font-size:1.2rem;flex-shrink:0;width:28px;text-align:center;margin-top:1px;}
.task-info{flex:1;}
.task-name{font-size:0.85rem;font-weight:700;color:var(--parchment);}
.task-page{font-size:0.62rem;font-family:var(--font-title);letter-spacing:0.8px;padding:1px 6px;border-radius:6px;background:rgba(244,185,66,0.07);border:1px solid rgba(244,185,66,0.12);color:var(--gold);margin-right:5px;}
.task-status-row{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap;}
.status-chip{font-size:0.62rem;font-family:var(--font-title);letter-spacing:0.5px;padding:2px 8px;border-radius:10px;}
.sc-done{background:rgba(61,219,160,0.1);color:var(--gem-green);border:1px solid rgba(61,219,160,0.18);}
.sc-partial{background:rgba(244,156,66,0.1);color:var(--gem-amber);border:1px solid rgba(244,156,66,0.18);}
.sc-pending{background:rgba(255,255,255,0.03);color:rgba(232,213,176,0.3);border:1px solid rgba(255,255,255,0.06);}
.task-stars{color:var(--gold);font-size:0.9rem;letter-spacing:1px;}
.task-comment{margin-top:6px;padding:8px 10px;background:rgba(56,198,244,0.05);border-left:2px solid rgba(56,198,244,0.3);border-radius:0 8px 8px 0;font-size:0.78rem;color:rgba(232,213,176,0.7);line-height:1.6;font-style:italic;}
.teacher-comment-label{font-family:var(--font-title);font-size:0.58rem;letter-spacing:1px;text-transform:uppercase;color:var(--gem-blue);margin-bottom:3px;opacity:0.8;}

/* GENERAL NOTE */
.general-note-section{padding:1rem 1.5rem;border-top:1px solid rgba(244,185,66,0.06);}
.note-box{background:rgba(244,185,66,0.04);border:1px solid rgba(244,185,66,0.12);border-radius:10px;padding:12px 14px;font-size:0.82rem;color:rgba(232,213,176,0.75);line-height:1.7;white-space:pre-wrap;}

/* RANKING */
.panel-card{border:1px solid rgba(244,185,66,0.12);border-radius:16px;padding:1.5rem;background:linear-gradient(135deg,rgba(22,33,62,0.95),rgba(15,52,96,0.6));box-shadow:0 8px 32px rgba(0,0,0,0.3);}
.panel-title{font-family:var(--font-title);font-size:0.65rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:1.2rem;display:flex;align-items:center;gap:8px;}
.ranking-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(244,185,66,0.06);}
.ranking-row:last-child{border:none;}
.rank-pos{font-family:var(--font-display);font-size:1.3rem;width:34px;text-align:center;flex-shrink:0;}
.rank-info{flex:1;}
.rank-name{font-family:var(--font-title);font-size:0.85rem;font-weight:600;color:var(--parchment);}
.rank-meta{font-size:0.7rem;color:rgba(232,213,176,0.45);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.rank-bar-wrap{width:90px;background:rgba(255,255,255,0.04);border-radius:99px;height:6px;flex-shrink:0;}
.rank-bar{height:6px;border-radius:99px;transition:width 0.7s cubic-bezier(.34,1.56,.64,1);}

/* NO GROUP MSG */
.no-group{text-align:center;padding:2rem;font-family:var(--font-title);font-size:0.8rem;color:rgba(232,213,176,0.35);letter-spacing:1px;}

@media(max-width:600px){.main,.nav-wrap{padding-left:1rem;padding-right:1rem;}.rank-bar-wrap{display:none;}.hero{padding:1.5rem 1rem 1rem;}}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:rgba(22,33,62,0.5);}::-webkit-scrollbar-thumb{background:rgba(244,185,66,0.18);border-radius:3px;}
</style>
</head>
<body>

<!-- HERO -->
<header class="hero">
  <div class="hero-border">
    <div class="logo-wrap">
      <img src="El_Secreto_de_las_Gemas-2.png" alt="Logo El Secreto de las Gemas" onerror="this.parentNode.innerHTML='<span style=&quot;font-size:3rem;display:block;text-align:center&quot;>🔮</span>'">
    </div>
    <p class="hero-eyebrow">Los Gallardos 2050 · 4.º de Primaria</p>
    <h1 class="hero-title">El Secreto de las Gemas</h1>
    <p class="hero-sub">Aprendizaje Cooperativo · Misión Activa</p>
    <div class="selector-title">Selecciona tu equipo para ver tu progreso</div>
    <div class="groups-selector" id="groups-selector"></div>
  </div>
</header>

<!-- NAV -->
<nav class="nav-wrap">
  <div class="nav">
    <button class="nav-btn active" onclick="showView('migrupo',this)">💎 Mi Grupo</button>
    <button class="nav-btn" onclick="showView('ranking',this)">🏆 Ranking</button>
  </div>
</nav>

<!-- MAIN -->
<main class="main">

  <!-- MI GRUPO -->
  <div id="view-migrupo" class="view active">
    <div id="my-group-content">
      <div class="no-group">✦ · · · Selecciona tu equipo arriba · · · ✦</div>
    </div>
  </div>

  <!-- RANKING -->
  <div id="view-ranking" class="view">
    <div class="panel-card">
      <div class="panel-title">✦ Clasificación de Gemas</div>
      <div id="ranking-list"></div>
    </div>
  </div>

</main>

<script src="shared.js"></script>
<script>
let selectedGroup = localStorage.getItem('student_selected_group') || null;

/* ── SELECTOR DE GRUPO ── */
function renderSelector(){
  const groups = loadData();
  document.getElementById('groups-selector').innerHTML = groups.map(g => `
    <button class="sel-btn ${selectedGroup===g.id?'active':''}" onclick="selectGroup('${g.id}')">
      ${g.emoji} ${g.name}
    </button>`).join('');
}

function selectGroup(gid){
  selectedGroup = gid;
  localStorage.setItem('student_selected_group', gid);
  renderSelector();
  renderMyGroup();
}

/* ── MI GRUPO ── */
function renderMyGroup(){
  if(!selectedGroup){ document.getElementById('my-group-content').innerHTML='<div class="no-group">✦ · · · Selecciona tu equipo arriba · · · ✦</div>'; return; }
  const groups = loadData();
  const g = groups.find(x=>x.id===selectedGroup);
  if(!g){ return; }
  const pts = getPoints(g), lv = getLevel(pts), done = countDone(g);
  const pct = Math.round((done/TASKS.length)*100);

  // roles
  const roleDefs = [
    {key:'coord',lbl:'Coordinador/a',icon:'⚔️'},
    {key:'secre',lbl:'Secretari@',icon:'📜'},
    {key:'moder',lbl:'Moderador/a',icon:'⚖️'},
    {key:'porta',lbl:'Portavoz',icon:'📣'},
  ];
  const hasRoles = roleDefs.some(r=>g.roles?.[r.key]);
  const hasNote = g.generalNote && g.generalNote.trim().length > 0;

  document.getElementById('my-group-content').innerHTML = `
  <div class="gem-card my-group-panel" style="--card-accent:${g.accent}">

    <!-- CABECERA -->
    <div class="mg-header" style="background:linear-gradient(135deg,${g.solid}18,${g.solid}06)">
      <span class="mg-emoji" style="filter:drop-shadow(0 0 12px ${g.solid}88)">${g.emoji}</span>
      <div>
        <div class="mg-title">${g.name}</div>
        <div class="mg-meta">
          <span class="level-gem ${lv.cls}">${lv.icon} ${lv.label}</span>
          <span>${pts} puntos · ${done}/${TASKS.length} misiones</span>
        </div>
      </div>
    </div>

    <!-- PROGRESO -->
    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-label">Progreso de la misión</span>
        <span class="progress-pct">${pct}%</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${g.accent}"></div></div>
      <div class="pts-big">${pts}</div>
      <div class="pts-sub">gemas conquistadas</div>
    </div>

    <!-- ROLES -->
    ${hasRoles ? `
    <div class="section-lbl" style="padding:0.8rem 1.5rem 0;margin-bottom:0">Roles del equipo</div>
    <div class="roles-section">
      ${roleDefs.map(r=>`
      <div class="role-card">
        <div class="role-icon">${r.icon}</div>
        <div class="role-title">${r.lbl}</div>
        ${g.roles?.[r.key]
          ? `<div class="role-name">${g.roles[r.key]}</div>`
          : `<div class="role-empty">—</div>`}
      </div>`).join('')}
    </div>` : ''}

    <!-- MISIONES -->
    <div class="section-lbl" style="padding:0.8rem 1.5rem 0;margin-bottom:0">Estado de las misiones</div>
    <div class="tasks-section">
      ${g.tasks.map(t=>{
        const task = TASKS.find(x=>x.id===t.id);
        const isDone = t.status==='done', isPartial = t.status==='partial';
        const scCls = isDone?'sc-done':isPartial?'sc-partial':'sc-pending';
        const scLbl = isDone?'✅ Completa':isPartial?'⏳ En progreso':'◻ Pendiente';
        const icon = isDone?'✅':isPartial?'⏳':'🔒';
        const starsStr = t.stars ? '★'.repeat(t.stars)+'☆'.repeat(3-t.stars) : '';
        return `<div class="task-item">
          <div class="task-icon">${icon}</div>
          <div class="task-info">
            <div class="task-name">
              <span class="task-page">${task.page}</span>${task.name}
            </div>
            <div class="task-status-row">
              <span class="status-chip ${scCls}">${scLbl}</span>
              ${starsStr ? `<span class="task-stars">${starsStr}</span>` : ''}
              ${isDone && t.stars ? `<span style="font-size:0.7rem;color:rgba(244,185,66,0.6);font-family:var(--font-title)">${t.stars*10} pts</span>` : ''}
            </div>
            ${t.comment ? `
            <div class="task-comment">
              <div class="teacher-comment-label">💬 Comentario del maestro/a</div>
              ${t.comment}
            </div>` : ''}
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- NOTA GENERAL -->
    ${hasNote ? `
    <div class="general-note-section">
      <div class="section-lbl" style="margin-bottom:8px">📜 Valoración general del maestro/a</div>
      <div class="note-box">${g.generalNote}</div>
    </div>` : ''}

  </div>`;
}

/* ── RANKING ── */
function renderRanking(){
  const groups=loadData(),sorted=[...groups].sort((a,b)=>getPoints(b)-getPoints(a)),maxPts=Math.max(1,getPoints(sorted[0]));
  const medals=['🥇','🥈','🥉'];
  document.getElementById('ranking-list').innerHTML=sorted.map((g,i)=>{
    const pts=getPoints(g),lv=getLevel(pts),pct=Math.round((pts/maxPts)*100);
    const isMe = g.id===selectedGroup;
    return `<div class="ranking-row" style="${isMe?'background:rgba(244,185,66,0.06);border-radius:10px;padding-left:8px;':''}">
      <div class="rank-pos" style="color:${i<3?['#FFD700','#C0C0C0','#CD7F32'][i]:g.solid}">${medals[i]||i+1}</div>
      <div style="font-size:1.4rem;filter:drop-shadow(0 0 6px ${g.solid}66)">${g.emoji}</div>
      <div class="rank-info">
        <div class="rank-name">${g.name}${isMe?' <span style="font-size:0.62rem;color:var(--gold);font-family:var(--font-title);letter-spacing:1px">← Mi equipo</span>':''}</div>
        <div class="rank-meta">
          <span class="level-gem ${lv.cls}">${lv.icon} ${lv.label}</span>
          <span>${pts} pts</span><span>${countDone(g)}/${TASKS.length} misiones</span>
        </div>
      </div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pct}%;background:${g.accent}"></div></div>
    </div>`;
  }).join('');
}

function showView(name,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  btn?.classList.add('active');
  if(name==='ranking')renderRanking();
  if(name==='migrupo')renderMyGroup();
}

/* ── INIT ── */
renderSelector();
if(selectedGroup) renderMyGroup();

/* ── AUTO-REFRESH cada 30s por si el docente actualiza datos ── */
setInterval(()=>{
  if(selectedGroup) renderMyGroup();
  const activeRanking = document.getElementById('view-ranking').classList.contains('active');
  if(activeRanking) renderRanking();
  renderSelector();
}, 30000);
</script>
</body>
</html>
